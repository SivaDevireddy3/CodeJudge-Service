spring.application.name=codejudge-service

# ?? Server ????????????????????????????????????????????????????
server.port=8080

# ?? Database ?????????????????????????????????????????????????
# Development: using Neon hosted PostgreSQL
# Production: set DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD env vars
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ?? JPA ??????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Dialect does not need to be set explicitly for Postgres ? Hibernate auto-detects it.
# Setting it produces a WARN log. Uncomment only if you need to override.
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ?? JWT ??????????????????????????????????????????????????????
# Production: set JWT_SECRET env var. Generate with: openssl rand -hex 64
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ?? Judge ?????????????????????????????????????????????????????
judge.docker.image.java=openjdk:17-slim
judge.docker.image.python=python:3.11-slim
judge.docker.image.cpp=gcc:12-slim
judge.docker.image.javascript=node:18-slim
judge.default.time-limit-ms=2000
judge.default.memory-limit-mb=256

# ?? CORS ?????????????????????????????????????????????????????
app.cors.allowed-origins=https://codejudge-gamma.vercel.app/

# ?? Logging ??????????????????????????????????????????????????
logging.level.com.siva.codejudge_service=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN