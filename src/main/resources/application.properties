spring.application.name=codejudge-service

server.port=8080

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false


app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000


judge.docker.image.java=openjdk:17-slim
judge.docker.image.python=python:3.11-slim
judge.docker.image.cpp=gcc:12-slim
judge.docker.image.javascript=node:18-slim
judge.default.time-limit-ms=2000
judge.default.memory-limit-mb=256


app.cors.allowed-origins=http://localhost:3000,https://codejudge-gamma.vercel.app/


app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}
app.admin.email=${ADMIN_EMAIL}


logging.level.com.siva.codejudge_service=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN